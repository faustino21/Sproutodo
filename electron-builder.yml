appId: io.github.faustino21.sproutodo
productName: sproutodo
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: build/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: faustino21
  repo: Sproutodo
